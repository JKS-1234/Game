<!DOCTYPE html>
<html>
<head>
    <title>Classic Snake</title>
    <style>
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; flex-direction: column; }
        canvas { background: #000; border: 2px solid #fff; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <h2>Snake Game</h2>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gridSize = 20;
        let snake = [{x: 160, y: 160}];
        let dx = gridSize, dy = 0;
        let apple = {x: 300, y: 300};
        let score = 0;

        function main() {
            if (hasGameEnded()) return alert(`Game Over! Score: ${score}`);
            setTimeout(function onTick() {
                clearCanvas();
                drawApple();
                advanceSnake();
                drawSnake();
                main();
            }, 100);
        }

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        function drawSnake() {
            ctx.fillStyle = 'lime';
            ctx.strokeStyle = 'darkgreen';
            snake.forEach(part => { ctx.fillRect(part.x, part.y, gridSize, gridSize); ctx.strokeRect(part.x, part.y, gridSize, gridSize); });
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (head.x === apple.x && head.y === apple.y) {
                score += 10;
                generateApple();
            } else {
                snake.pop();
            }
        }

        function drawApple() { ctx.fillStyle = 'red'; ctx.fillRect(apple.x, apple.y, gridSize, gridSize); }

        function generateApple() {
            apple.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            apple.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return snake[0].x < 0 || snake[0].x >= canvas.width || snake[0].y < 0 || snake[0].y >= canvas.height;
        }

        document.addEventListener("keydown", e => {
            if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -gridSize; }
            if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = gridSize; }
            if (e.key === 'ArrowLeft' && dx === 0) { dx = -gridSize; dy = 0; }
            if (e.key === 'ArrowRight' && dx === 0) { dx = gridSize; dy = 0; }
        });

        main();
    </script>
</body>
</html>
